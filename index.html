    <style>
        :root { 
            --primary: #58a6ff; 
            --bg: #0d1117; 
            --card-bg: #161b22; 
            --text: #c9d1d9; 
            --success: #7ee787; 
            --error: #ff7b72;
            --gold: #ffd700;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
            margin: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .card { 
            background: var(--card-bg); 
            border: 2px solid var(--primary); 
            border-radius: 16px; 
            padding: 30px; 
            max-width: 480px; 
            width: 100%; 
            box-shadow: 0 0 25px rgba(88, 166, 255, 0.25); 
            box-sizing: border-box; 
        }
        h1 { color: var(--primary); font-size: 1.4rem; margin-top: 0; margin-bottom: 15px; text-align: center; }
        p { line-height: 1.6; font-size: 1rem; color: #e6edf3; }
        code { background: #21262d; padding: 2px 6px; border-radius: 4px; color: #ff7b72; font-family: monospace; }
        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 0.95rem; 
            color: #8b949e; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #30363d; 
            padding-bottom: 12px; 
            font-weight: bold;
        }
        /* 유저용 초기화 버튼 스타일 */
        .reset-link {
            background: #21262d;
            border: 1px solid #30363d;
            color: var(--error);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .reset-link:hover {
            background: var(--error);
            color: #ffffff;
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            background: #21262d; 
            border: 1px solid #30363d; 
            color: var(--text); 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem; 
            text-align: left; 
            transition: all 0.2s ease; 
        }
        .btn:hover { 
            background: var(--primary); 
            color: #0d1117; 
            font-weight: bold; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
        }
        input[type="text"], select { 
            width: 100%; 
            padding: 12px; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            font-size: 1rem;
        }
        .success-text { color: var(--success); font-weight: bold; font-size: 1.3rem; text-align: center; margin-bottom: 10px; }
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95rem; text-align: left; }
        .rank-table th, .rank-table td { padding: 10px; border-bottom: 1px solid #30363d; }
        .admin-panel { 
            display: none;
            margin-top: 25px; max-width: 480px; width: 100%; background: #161b22; padding: 12px; border-radius: 8px; font-size: 0.85rem; text-align: center; border: 1px dashed #30363d;
        }
        .admin-panel button { background: #21262d; color: var(--text); border: 1px solid #30363d; padding: 5px 10px; margin: 2px; border-radius: 4px; cursor: pointer; }
        .lock-notice { background: rgba(255, 123, 114, 0.1); border: 1px solid var(--error); color: var(--error); padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 15px; text-align: center; }
        .move-box { background: rgba(88, 166, 255, 0.1); border: 1px solid var(--primary); padding: 15px; border-radius: 8px; text-align: center; margin-top: 15px; }
    </style>

            const panelNames = ["", "1번 판넬 (시작 : 작전발령)", "2번 판넬 (Zone1 : 지능형SW과 교육과정)", "3번 판넬 (Zone1 : 지능형SW과 미션 힌트)", "4번 판넬 (Zone2 : 메타버스게임과 교육과정)", "5번 판넬 (Zone2 : 메타버스게임과 미션 힌트)", "6번 판넬 (Zone3 : 클라우드보안과 교육과정)", "7번 판넬 (Zone3 : 클라우드보안과 미션힌트)", "8번 판넬 (임무완료 : 최종 요원 인증서 수령처)"];
            const panelRules = [{}, { reqLevel: 1, quizLevel: 1 }, { reqLevel: 2, quizLevel: 2 }, { reqLevel: 3, quizLevel: 3 }, { reqLevel: 4, quizLevel: 4 }, { reqLevel: 5, quizLevel: 5 }, { reqLevel: 6, quizLevel: null, isPass: true }, { reqLevel: 6, quizLevel: null, isPass: true }, { reqLevel: 6, quizLevel: 6 }];

            let selectedCourse = 1; let currentLevel = 1; let targetPanel = 1; let isWaitingForNextTag = false; let startTime = null; let timerInterval = null; let nickname = ""; let finalSeconds = 0;

            function showIntro() {
                clearInterval(timerInterval);
                document.getElementById('progress').innerText = "0 / 6";
                document.getElementById('timer').innerText = "00:00";
                isWaitingForNextTag = false;
                
                if (localStorage.getItem('is_playing') === 'true') {
                    nickname = localStorage.getItem('locked_nickname') || "재접속 요원";
                    selectedCourse = parseInt(localStorage.getItem('locked_course')) || 1;
                    currentLevel = parseInt(localStorage.getItem('current_level')) || 1;
                    targetPanel = parseInt(localStorage.getItem('target_panel')) || 1;
                    isWaitingForNextTag = localStorage.getItem('waiting_tag') === 'true';
                    
                    let savedStart = localStorage.getItem('start_time');
                    if (savedStart) startTime = new Date(parseInt(savedStart));
                    else { startTime = new Date(); localStorage.setItem('start_time', startTime.getTime()); }
                    
                    timerInterval = setInterval(updateTimer, 1000);
                    let urlParams = new URLSearchParams(window.location.search);
                    let stageParam = parseInt(urlParams.get('stage'));
                    if (stageParam) processTagAction(stageParam);
                    else renderQuiz();
                    return;
                }
                
                document.getElementById('game-screen').innerHTML = `
                    <h1>🕵️‍♂️ 사이버 요원 해킹 챌린지</h1>
                    <p style="text-align:center; color:#8b949e; margin-bottom:20px;">코드명 입력 후 본인의 작전 코스를 선택하세요!</p>
                    <input type="text" id="nickInput" placeholder="코드명 입력 (예: 서울중_홍길동)" />
                    <div style="margin-top:15px;">
                        <select id="courseSelect">
                            <option value="1">🟢 1코스: 사이버 보안 입문 (초급)</option>
                            <option value="2">🔵 2코스: 인터넷 & 네트워크 보안 (중급)</option>
                            <option value="3">🟠 3코스: 화이트해커 웹 해킹 (심화)</option>
                            <option value="4">🔴 4코스: 암호학 & 인코딩 대치전 (심화)</option>
                            <option value="5">💀 5코스: 악성코드 & 리버스 엔지니어링 (마스터)</option>
                        </select>
                    </div>
                    <button class="btn" id="start-mission-btn" style="text-align:center; background:var(--primary); color:#0d1117; font-weight:bold; margin-top:15px;">미션 가동 (1번 판넬에서 대기)</button>
                `;
                document.getElementById('nickInput').addEventListener('keyup', function(e) { if(e.keyCode === 13) startGame(); });
                document.getElementById('start-mission-btn').addEventListener('click', startGame);
            }

            function startGame() {
                let input = document.getElementById('nickInput').value.trim();
                if(!input) { alert("작전 코드명을 입력해주세요!"); return; }
                nickname = input;
                selectedCourse = parseInt(document.getElementById('courseSelect').value);
                currentLevel = 1; targetPanel = 1; isWaitingForNextTag = false;
                
                localStorage.setItem('locked_nickname', nickname);
                localStorage.setItem('locked_course', selectedCourse);
                localStorage.setItem('current_level', currentLevel);
                localStorage.setItem('target_panel', targetPanel);
                localStorage.setItem('waiting_tag', 'false');
                localStorage.setItem('is_playing', 'true');
                
                startTime = new Date();
                localStorage.setItem('start_time', startTime.getTime());
                timerInterval = setInterval(updateTimer, 1000);
                renderQuiz();
            }

            function updateTimer() {
                if (!startTime) return;
                let now = new Date();
                finalSeconds = Math.floor((now - startTime) / 1000);
                let min = String(Math.floor(finalSeconds / 60)).padStart(2, '0');
                let sec = String(finalSeconds % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${min}:${sec}`;
            }

            function processTagAction(scannedPanel) {
                if (isWaitingForNextTag) {
                    if (scannedPanel === targetPanel) {
                        isWaitingForNextTag = false;
                        localStorage.setItem('waiting_tag', 'false');
                        
                        if (panelRules[scannedPanel] && panelRules[scannedPanel].isPass) {
                            targetPanel++;
                            localStorage.setItem('target_panel', targetPanel);
                            isWaitingForNextTag = true;
                            localStorage.setItem('waiting_tag', 'true');
                        }
                    }
                }
                renderQuiz(scannedPanel);
            }

            function renderQuiz(scannedPanel = null) {
                document.getElementById('progress').innerText = `${currentLevel - 1} / 6`;
                let html = "";

                if (isWaitingForNextTag) {
                    document.getElementById('game-screen').innerHTML = `
                        <h1>🔓 접근 권한 대기 중</h1>
                        <div class="move-box">
                            <p style="font-size:1.2rem; color:var(--success); font-weight:bold; margin:0 0 10px 0;">🎯 임무 수행 완료!</p>
                            <p style="margin:0; font-size:1rem; line-height:1.5;">다음 시스템을 잠금해제하려면<br><b style="color:var(--gold); font-size:1.1rem;">[ ${panelNames[targetPanel]} ]</b>로 이동하여 스마트폰을 태그하세요.</p>
                        </div>
                    `;
                    return;
                }

                if (scannedPanel && scannedPanel !== targetPanel) {
                    html += `<div class="lock-notice">🔒 동선 이탈 경고: 현재 요원님은 <b>[ ${panelNames[targetPanel]} ]</b> 임무를 수행해야 합니다. 이동해 주세요.</div>`;
                }

                let activeQuizLevel = (panelRules[targetPanel] && panelRules[targetPanel].quizLevel) || currentLevel;
                let q = quizDatabase[selectedCourse][activeQuizLevel];
                html += `<h1>${q.title}</h1><p style='margin-bottom:20px;'>${q.question}</p>`;

                if(q.type === "choice") {
                    q.options.forEach((opt, idx) => {
                        html += `<button class="btn choice-option" data-idx="${idx}">${idx+1}. ${opt}</button>`;
                    });
                } else if(q.type === "input") {
                    html += `
                        <input type="text" id="textAnswer" placeholder="정답 플래그를 입력하세요." />
                        <button class="btn" id="submit-input-btn" style="text-align:center; background:var(--primary); color:#0d1117; font-weight:bold;">시스템 복구 코드 제출</button>
                    `;
                }
                document.getElementById('game-screen').innerHTML = html;

                if(q.type === "choice") {
                    const buttons = document.querySelectorAll('.choice-option');
                    buttons.forEach(btn => { btn.addEventListener('click', function() { submitAnswer(parseInt(this.getAttribute('data-idx'))); }); });
                } else if(q.type === "input") {
                    const txtInp = document.getElementById('textAnswer');
                    txtInp.focus();
                    txtInp.addEventListener('keyup', function(e) { if(e.keyCode === 13) submitAnswer(null); });
                    document.getElementById('submit-input-btn').addEventListener('click', function() { submitAnswer(null); });
                }
            }

            function submitAnswer(chosenIdx) {
                let activeQuizLevel = (panelRules[targetPanel] && panelRules[targetPanel].quizLevel) || currentLevel;
                let q = quizDatabase[selectedCourse][activeQuizLevel];
                let isCorrect = false;

                if(q.type === "choice") { 
                    let userChoiceNumber = String(chosenIdx + 1); 
                    if(getSecureHash(userChoiceNumber) === q.answer) isCorrect = true; 
                } else if(q.type === "input") {
                    let userAns = document.getElementById('textAnswer').value.trim();
                    
                    let match = userAns.match(/flag\s*\{\s*([\s\S]*?)\s*\}/i);
                    if (match) {
                        userAns = match[1].trim(); 
                    }
                    
                    if(userAns.toLowerCase() === q.answer.toLowerCase()) {
                        isCorrect = true;
                    }
                    
                    if(selectedCourse === 1 && userAns.includes("한세사이버보안고")) {
                        isCorrect = true;
                    }
                }

                if(isCorrect) {
                    currentLevel++; targetPanel++; 
                    localStorage.setItem('current_level', currentLevel);
                    localStorage.setItem('target_panel', targetPanel);
                    
                    if(currentLevel > 6) { 
                        saveRecordAndShowRank(); 
                    } else { 
                        isWaitingForNextTag = true; 
                        localStorage.setItem('waiting_tag', 'true'); 
                        renderQuiz(); 
                    }
                } else { 
                    alert("❌ 암호 해독 실패: 접근이 거부되었습니다!"); 
                }
            }

            function saveRecordAndShowRank() {
                clearInterval(timerInterval); 
                let now = new Date(); finalSeconds = Math.floor((now - startTime) / 1000);
                let timeString = `${String(Math.floor(finalSeconds / 60)).padStart(2, '0')}:${String(finalSeconds % 60).padStart(2, '0')}`;
                let baseScore = selectedCourse * 2000; let finalCalculatedScore = Math.max(100, baseScore - finalSeconds);

                database.ref('ranking').push({ username: nickname, courseName: `${selectedCourse}코스`, displayTime: timeString, finalScore: finalCalculatedScore, timestamp: Date.now() });
                localStorage.clear();

                document.getElementById('game-screen').innerHTML = `
                    <div class="success-text">🎉 미션 완벽 클리어! 🎉</div>
                    <p style="text-align:center; margin-bottom:15px;"><b>요원코드:</b> ${nickname} [${selectedCourse}코스] <br> <b>획득 점수:</b> <span style="color:var(--gold); font-weight:bold;">${finalCalculatedScore.toLocaleString()}점</span> (기록: ${timeString})</p>
                    <hr style="border:none; border-top:1px solid #30363d; margin:15px 0;">
                    <h3 style="text-align:center; color:var(--primary); font-size:1.1rem; margin-bottom:10px;">📊 통합 요원 명예의 전당 (TOP 5)</h3>
                    <table class="rank-table"><thead><tr><th>순위</th><th>요원명</th><th>점수</th><th>기록</th></tr></thead><tbody id="rank-rows"><tr><td colspan="4" style="text-align:center; color:#8b949e;">사령부 데이터 동기화 중...</td></tr></tbody></table>
                    <button class="btn" id="go-home-btn" style="text-align:center; margin-top:20px; font-weight:bold;">처음 화면으로</button>
                `;
                document.getElementById('go-home-btn').addEventListener('click', resetGame);

                database.ref('ranking').once('value', (snapshot) => {
                    let allRecords = [];
                    snapshot.forEach((childSnapshot) => {
                        let data = childSnapshot.val();
                        allRecords.push({ username: data.username || "익명 요원", courseName: data.courseName || "1코스", finalScore: data.finalScore || 0, displayTime: data.displayTime || "00:00" });
                    });
                    allRecords.sort((a, b) => b.finalScore - a.finalScore);
                    let rowsHtml = "";
                    for(let rank = 1; rank <= Math.min(allRecords.length, 5); rank++) {
                        let item = allRecords[rank - 1]; let medal = rank === 1 ? "🥇 " : rank === 2 ? "🥈 " : rank === 3 ? "🥉 " : "";
                        rowsHtml += `<tr><td>${medal}${rank}등</td><td>${item.username} (${item.courseName})</td><td style="color:var(--gold);">${item.finalScore.toLocaleString()}점</td><td>${item.displayTime}</td></tr>`;
                    }
                    document.getElementById('rank-rows').innerHTML = rowsHtml;
                });
            }

            function triggerTag(num) { if(localStorage.getItem('is_playing') === 'true') { processTagAction(num); } else { alert("인트로 화면에서 미션을 가동해 주세요."); } }
            
            // 🔄 공용 게임 초기화 함수 (URL 파라미터 청소 포함)
            function resetGame() { 
                localStorage.clear(); 
                let cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname; 
                window.history.replaceState({}, document.title, cleanUrl); 
                showIntro(); 
            }

            // 🎯 초기화 버튼 클릭 확인 이벤트 연결
            document.getElementById('user-reset-btn').addEventListener('click', function() {
                if (confirm("🔄 정말 처음화면으로 돌아가 미션을 다시 시작하시겠습니까?\n(현재 진행 중인 코스의 기록이 초기화됩니다.)")) {
                    resetGame();
                }
            });

            let urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('admin') === '2026') {
                document.getElementById('secret-admin-panel').style.display = 'block';
            }

            for(let i=1; i<=8; i++) { document.getElementById(`sim-btn-${i}`).addEventListener('click', function() { triggerTag(i); }); }
            document.getElementById('sim-btn-reset').addEventListener('click', resetGame);
