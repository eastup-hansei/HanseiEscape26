        :root {

            --success: #7ee787; 
            --error: #ff7b72;

            color: var(--text);

            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
            margin: 0;
        }
        .card { 
            background: var(--card-bg); 
            border: 2px solid var(--primary); 
            border-radius: 16px; 
            padding: 30px; 
            max-width: 480px; 
            width: 100%; 
            box-shadow: 0 0 25px rgba(88, 166, 255, 0.25); 
            box-sizing: border-box; 
        }
        h1 { color: var(--primary); font-size: 1.4rem; margin-top: 0; margin-bottom: 15px; text-align: center; }
        p { line-height: 1.6; font-size: 1rem; color: #e6edf3; }
        code { background: #21262d; padding: 2px 6px; border-radius: 4px; color: #ff7b72; font-family: monospace; }
        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.95rem; 
            color: #8b949e; 
            margin-bottom: 20px; 
            border-bottom: 1px solid #30363d; 
            padding-bottom: 12px; 
            font-weight: bold;
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            background: #21262d; 
            border: 1px solid #30363d; 
            color: var(--text); 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem; 
            text-align: left; 
            transition: all 0.2s ease; 
        }
        .btn:hover { 
            background: var(--primary); 
            color: #0d1117; 
            font-weight: bold; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
        }
        input[type="text"], select { 
            width: 100%; 
            padding: 12px; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            font-size: 1rem;
        }
        .success-text { color: var(--success); font-weight: bold; font-size: 1.3rem; text-align: center; margin-bottom: 10px; }
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.95rem; text-align: left; }
        .rank-table th, .rank-table td { padding: 10px; border-bottom: 1px solid #30363d; }
        .admin-panel { 
            margin-top: 25px; max-width: 480px; width: 100%; background: #161b22; padding: 12px; border-radius: 8px; font-size: 0.85rem; text-align: center; border: 1px dashed #30363d;
        }
