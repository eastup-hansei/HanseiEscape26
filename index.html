            color: var(--text); 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem; 
            text-align: left;

            color: #0d1117; 
            font-weight: bold; 
            transform: translateY(-2px);

        .btn:disabled {

            color: #8b949e;
            border-color: #21262d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

            background: #0d1117; 
            border: 1px solid #30363d; 
            color: #fff; 
            border-radius: 8px;

            }
            
            document.getElementById('game-screen').innerHTML = `
                <h1>🕵️‍♂️ 사이버 요원 해킹 챌린지</h1>
                <p style="text-align:center; color:#8b949e; margin-bottom:20px;">코드명 입력 후 본인의 실력에 맞는 비밀 작전 코스를 선택하세요!</p>
                
                <input type="text" id="nickInput" placeholder="코드명 입력 (예: 서울중_홍길동)" onkeyup="if(window.event.keyCode==13){startGame()}" />
                
                <div style="margin-top:15px; text-align:left;">
                    <label style="font-weight:bold; color:var(--primary); font-size:0.9rem;">🎯 작전 코스 설정:</label>
                    <select id="courseSelect" style="margin-top:6px;">
                        <option value="1">🟢 1코스: 사이버 보안 입문 (초급 상식)</option>
                        <option value="2">🔵 2코스: 인터넷 & 네트워크 보안 (중급)</option>
                        <option value="3">🟠 3코스: 화이트해커 웹 해킹 (중3 추천 심화)</option>
                        <option value="4">🔴 4코스: 암호학 & 인코딩 대치전 (심화 훈련)</option>
                        <option value="5">💀 5코스: 악성코드 & 리버스 엔지니어링 (최상위 마스터)</option>
                    </select>
                </div>
                
                <button class="btn" onclick="startGame()" style="text-align:center; background:var(--primary); color:#0d1117; font-weight:bold; margin-top:15px;">미션 가동 (타이머 시작)</button>
            `;
        }

        function startGame() {
            let input = document.getElementById('nickInput').value.trim();
            if(!input) { alert("작전 코드명(닉네임)을 입력해주세요!"); return; }
            nickname = input;
            selectedCourse = parseInt(document.getElementById('courseSelect').value);
            
            let urlParams = new URLSearchParams(window.location.search);
            let stageParam = parseInt(urlParams.get('stage'));
            currentLevel = (stageParam && stageParam >= 1 && stageParam <= 6) ? stageParam : 1;
            
            localStorage.setItem('locked_nickname', nickname);
            localStorage.setItem('locked_course', selectedCourse);
            localStorage.setItem('current_level', currentLevel);
            localStorage.setItem('is_playing', 'true');
            
            startTime = new Date();
            localStorage.setItem('start_time', startTime.getTime());
            
            timerInterval = setInterval(updateTimer, 1000);
            renderQuiz();
        }

        function updateTimer() {
            if (!startTime) return;
            let now = new Date();
            finalSeconds = Math.floor((now - startTime) / 1000);
            let min = String(Math.floor(finalSeconds / 60)).padStart(2, '0');
            let sec = String(finalSeconds % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${min}:${sec}`;
        }

        function renderQuiz() {
            document.getElementById('progress').innerText = `${currentLevel} / 6`;
            let q = quizDatabase[selectedCourse][currentLevel];
            let html = "";
            
            let urlParams = new URLSearchParams(window.location.search);
            let stageParam = parseInt(urlParams.get('stage'));
            if (stageParam && stageParam !== currentLevel) {
                html += `<div class="lock-notice">🔒 코스 고정 감지: 현재 부여된 진행 임무는 ${currentLevel}단계입니다.</div>`;
            }
            
            html += `<h1>${q.title}</h1><p style='margin-bottom:20px;'>${q.question}</p>`;

            if(q.type === "choice") {
                q.options.forEach((opt, idx) => {
                    html += `<button class="btn" onclick="submitAnswer(${idx})">${idx+1}. ${opt}</button>`;
                });
            } else if(q.type === "input") {
                html += `
                    <input type="text" id="textAnswer" placeholder="정답 플래그를 입력하세요 (엔터 가능)" onkeyup="if(window.event.keyCode==13){submitAnswer(null)}" />
                    <button class="btn" onclick="submitAnswer(null)" style="text-align:center; background:var(--primary); color:#0d1117; font-weight:bold;">시스템 복구 코드 제출</button>
                `;
            }
            document.getElementById('game-screen').innerHTML = html;
            if(q.type === "input") document.getElementById('textAnswer').focus();
        }

        function submitAnswer(chosenIdx) {
            let q = quizDatabase[selectedCourse][currentLevel];
            let isCorrect = false;

            if(q.type === "choice") { 
                if(chosenIdx === q.answer) isCorrect = true; 
            } else if(q.type === "input") {
                let userAns = document.getElementById('textAnswer').value.trim();
                if(selectedCourse === 1) {
                    if(userAns.includes("한세사이버보안고")) isCorrect = true;
                } else {
                    if(userAns === q.answer) isCorrect = true;
                }
            }

            if(isCorrect) {
                currentLevel++;
                localStorage.setItem('current_level', currentLevel);
                if(currentLevel > 6) { 
                    saveRecordAndShowRank(); 
                } else { 
                    renderQuiz(); 
                }
            } else { 
                alert("❌ 암호 해독 실패: 접근이 거부되었습니다!"); 
            }
        }

        function saveRecordAndShowRank() {
            clearInterval(timerInterval); 
            let now = new Date();
            finalSeconds = Math.floor((now - startTime) / 1000);
            
            let displayMin = String(Math.floor(finalSeconds / 60)).padStart(2, '0');
            let displaySec = String(finalSeconds % 60).padStart(2, '0');
            let timeString = `${displayMin}:${displaySec}`;
            
            document.getElementById('timer').innerText = timeString;

            let baseScore = selectedCourse * 2000; 
            let finalCalculatedScore = baseScore - finalSeconds;
            if(finalCalculatedScore < 0) finalCalculatedScore = 0; 

            database.ref('ranking').push({
                username: nickname,
                courseName: `${selectedCourse}코스`,
                displayTime: timeString, 
                finalScore: finalCalculatedScore,
                negativeScore: -finalCalculatedScore, 
                timestamp: Date.now()
            });

            localStorage.clear();

            document.getElementById('game-screen').innerHTML = `
                <div class="success-text">🎉 미션 완벽 클리어! 🎉</div>
                <p style="text-align:center; margin-bottom:15px;">
                    <b>요원코드:</b> ${nickname} [${selectedCourse}코스] <br> 
                    <b>획득 점수:</b> <span style="color:var(--gold); font-weight:bold;">${finalCalculatedScore.toLocaleString()}점</span> (기록: ${timeString})
                </p>
                <hr style="border:none; border-top:1px solid #30363d; margin:15px 0;">
                <h3 style="text-align:center; color:var(--primary); font-size:1.1rem; margin-bottom:10px;">📊 통합 요원 명예의 전당 (TOP 5)</h3>
                <table class="rank-table">
                    <thead><tr><th>순위</th><th>요원명(코스)</th><th>최종 점수</th><th>기록</th></tr></thead>
                    <tbody id="rank-rows"><tr><td colspan="4" style="text-align:center; color:#8b949e;">사령부 데이터 동기화 중...</td></tr></tbody>
                </table>
                <button class="btn" onclick="resetGame()" style="text-align:center; margin-top:20px; font-weight:bold; background:#21262d; border-color:#30363d;">처음 화면으로</button>
            `;

            database.ref('ranking').once('value', (snapshot) => {
                let allRecords = [];
                snapshot.forEach((childSnapshot) => {
                    let data = childSnapshot.val();
                    let score = data.finalScore;
                    if (score === undefined || score === null) {
                        let seconds = parseInt(data.score) || 60;
                        score = 2000 - seconds; 
                        if(score < 0) score = 0;
                    }
                    
                    let course = data.courseName || "1코스";
                    let time = data.displayTime || "00:00";

                    allRecords.push({
                        username: data.username || "익명 요원",
                        courseName: course,
                        finalScore: score,
                        displayTime: time
                    });
                });

                allRecords.sort((a, b) => b.finalScore - a.finalScore);

                let rowsHtml = "";
                let displayCount = Math.min(allRecords.length, 5);
                
                for(let rank = 1; rank <= displayCount; rank++) {
                    let item = allRecords[rank - 1];
                    let isMe = (item.username === nickname) ? "style='color:var(--success); font-weight:bold; background-color:rgba(126,231,135,0.05);'" : "";
                    let medal = rank === 1 ? "🥇 " : rank === 2 ? "🥈 " : rank === 3 ? "🥉 " : "";
                    
                    rowsHtml += `<tr ${isMe}>
                        <td>${medal}${rank}등</td>
                        <td>${item.username} <span style="font-size:0.8rem; color:#8b949e;">(${item.courseName})</span></td>
                        <td style="color:var(--gold); font-weight:bold;">${item.finalScore.toLocaleString()}점</td>
                        <td>${item.displayTime}</td>
                    </tr>`;
                }
                document.getElementById('rank-rows').innerHTML = rowsHtml || "<tr><td colspan='4' style='text-align:center;'>등록된 요원이 없습니다.</td></tr>";
            });
        }

        function goStation(num) { 
            if(localStorage.getItem('is_playing') === 'true' && num <= 6) { 
                currentLevel = num; 
                localStorage.setItem('current_level', currentLevel);
                renderQuiz(); 
            } else if (!startTime) {
                alert("인트로 화면에서 미션을 가동한 후에 시뮬레이터 구역 이동 기능이 팩토리 개방됩니다.");
            }
        }
        
        function resetGame() { 
            localStorage.clear();
            let cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
            showIntro(); 
        }
        
        showIntro();
    </script>
</body>
</html>
